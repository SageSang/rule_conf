server {
    listen 80;
    server_name _;

    # Only the router may read the private subscription. Replace this address if
    # the router LAN address changes.
    location = /openclash-private-extra-proxies.yaml {
        allow 192.168.31.4;
        deny all;

        default_type application/x-yaml;
        add_header Cache-Control "no-store" always;
        alias /source/openclash-private-extra-proxies.yaml;
    }

    location / {
        return 404;
    }
}
