services:
  openclash-sub:
    image: nginx:alpine
    container_name: openclash-sub
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      # Only exposes the dedicated private-node directory declared in default.conf.
      - /volume12/homes/sidney/Project/rule_conf/openclash-sub/private:/source:ro
      - /volume12/homes/sidney/Project/rule_conf/openclash-sub/default.conf:/etc/nginx/conf.d/default.conf:ro
