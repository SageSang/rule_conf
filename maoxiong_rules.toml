# ==========================================================
# 代理组（proxy_groups）
# ==========================================================

[[proxy_groups]]
name = "🧭 手动选择"
type = "select"
regex = "."

[[proxy_groups]]
name = "♻️ 自动选择"
type = "url-test"
regex = "."
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇭🇰 HK"
type = "url-test"
regex = "(?i)(🇭🇰|香港|HK|hong kong)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇹🇼 TW"
type = "url-test"
regex = "(?i)(🇹🇼|台湾|TW|taiwan|taipei|hinet)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇯🇵 JP"
type = "url-test"
regex = "(?i)(🇯🇵|日本|JP|tokyo|osaka)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇸🇬 SG"
type = "url-test"
regex = "(?i)(🇸🇬|新加坡|SG|singapore)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇺🇸 US"
type = "url-test"
regex = "(?i)(🇺🇸|美国|US|united states|los angeles|san jose|seattle|new york)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇦🇷 AR"
type = "url-test"
regex = "(?i)(🇦🇷|阿根廷|AR|argentina|buenos aires)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇬🇧 UK"
type = "url-test"
regex = "(?i)(🇬🇧|英国|英國|UK|GB|united kingdom|london|manchester)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🇩🇪 DE"
type = "url-test"
regex = "(?i)(🇩🇪|德国|德國|DE|germany|frankfurt|berlin)"
url = "https://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

[[proxy_groups]]
name = "🧊 冷门节点"
type = "select"
# 使用正向地区名单，避免“负向前瞻 + 通配符”触发校验器的回溯保护。
regex = "(?i)(🇦🇺|澳大利亚|澳洲|AU|🇨🇦|加拿大|CA|🇫🇷|法国|FR|🇰🇷|韩国|KR|🇳🇱|荷兰|NL|🇲🇾|马来西亚|MY|🇹🇭|泰国|TH|🇮🇳|印度|IN|🇹🇷|土耳其|TR|🇷🇺|俄罗斯|RU|🇧🇷|巴西|BR|🇮🇩|印度尼西亚|ID|🇵🇭|菲律宾|PH|🇻🇳|越南|VN|🇲🇴|澳门|MO|australia|canada|france|korea|netherlands|malaysia|thailand|india|turkey|russia|brazil|indonesia|philippines|vietnam|macau|europe)"

